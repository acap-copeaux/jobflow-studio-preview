<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analysis Screen</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Preview Screen</p>
      <h1>Analyse</h1>
      <p class="lead">Écran simulé pour la lecture et la structuration des informations utiles.</p>
    </header>

    <section class="workspace-grid">
      <article class="mock-panel">
        <div class="mock-head"><span>Synthèse</span><strong>Points forts</strong></div>
        <ul class="mock-list">
          <li>Éléments valorisables</li>
          <li>Bloc cohérent</li>
          <li>Résultats identifiables</li>
        </ul>
      </article>
      <article class="mock-panel">
        <div class="mock-head"><span>Synthèse</span><strong>Points à clarifier</strong></div>
        <ul class="mock-list">
          <li>Zones floues</li>
          <li>Manques de précision</li>
          <li>Incohérences possibles</li>
        </ul>
      </article>
    </section>
  </main>
</body>
</html>
