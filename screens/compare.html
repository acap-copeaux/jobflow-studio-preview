<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare Screen</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Preview Screen</p>
      <h1>Comparaison</h1>
      <p class="lead">Écran simulé pour visualiser les écarts entre les éléments du projet et la cible.</p>
    </header>

    <section class="workspace-grid">
      <article class="mock-panel">
        <div class="mock-head"><span>Bloc</span><strong>Correspondances</strong></div>
        <ul class="mock-list">
          <li>Points alignés</li>
          <li>Éléments forts</li>
          <li>Compatibilités visibles</li>
        </ul>
      </article>
      <article class="mock-panel">
        <div class="mock-head"><span>Bloc</span><strong>Écarts</strong></div>
        <ul class="mock-list">
          <li>Zones à renforcer</li>
          <li>Éléments absents</li>
          <li>Priorités de travail</li>
        </ul>
      </article>
    </section>
  </main>
</body>
</html>
