<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quality Screen</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Preview Screen</p>
      <h1>Contrôle qualité</h1>
      <p class="lead">Écran simulé pour relire les points forts, les points faibles et les ajustements recommandés.</p>
    </header>

    <section class="workspace-grid">
      <article class="mock-panel">
        <div class="mock-head"><span>Contrôle</span><strong>Points solides</strong></div>
        <ul class="mock-list">
          <li>Bloc cohérent</li>
          <li>Lecture fluide</li>
          <li>Éléments clairs</li>
        </ul>
      </article>
      <article class="mock-panel">
        <div class="mock-head"><span>Contrôle</span><strong>Ajustements</strong></div>
        <ul class="mock-list">
          <li>Raccourcir une zone</li>
          <li>Préciser un bloc</li>
          <li>Uniformiser le ton</li>
        </ul>
      </article>
    </section>
  </main>
</body>
</html>
