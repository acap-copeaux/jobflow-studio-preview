<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Screen</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Preview Screen</p>
      <h1>Upload</h1>
      <p class="lead">Écran simulé pour le dépôt des éléments d’entrée du projet.</p>
    </header>

    <section class="workspace-grid">
      <article class="mock-panel">
        <div class="mock-head"><span>Zone</span><strong>Fichiers</strong></div>
        <ul class="mock-list">
          <li>Document principal</li>
          <li>Document secondaire</li>
          <li>Notes complémentaires</li>
        </ul>
      </article>
      <article class="mock-panel">
        <div class="mock-head"><span>Zone</span><strong>Contexte</strong></div>
        <ul class="mock-list">
          <li>Titre cible</li>
          <li>Entreprise</li>
          <li>Préférences de ton</li>
        </ul>
      </article>
    </section>
  </main>
</body>
</html>
